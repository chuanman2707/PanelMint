# Legacy local helper only.
# Default deployment is Vercel + Neon Postgres + local worker + local generated asset storage.
# Use this file only if you want a disposable local Postgres stack for development.

services:
  postgres:
    image: postgres:16-alpine
    container_name: panelmint-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: panelmint
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change-local-dev-password
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d panelmint"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

volumes:
  postgres_data:
